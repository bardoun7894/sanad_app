name: sanad_app
description: "Sanad - Mental Health Support App"
publish_to: "none"
version: 1.0.3+27

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Network & Storage
  dio: ^5.7.0
  hive_flutter: ^1.1.0
  connectivity_plus: ^6.1.0 # Updated for Zego compatibility

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_messaging: ^15.1.3
  firebase_analytics: ^11.3.3
  cloud_firestore: ^5.4.4
  cloud_functions: ^5.1.4

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Authentication
  google_sign_in: 6.2.1
  sign_in_with_apple: ^6.1.1
  crypto: ^3.0.3

  # UI & UX
  share_plus: ^12.0.0 # Updated for Zego 4.22.x compatibility
  flutter_svg: ^2.0.16
  cached_network_image: ^3.3.0
  fl_chart: ^0.70.2
  vibration: ^3.1.3 # Updated for Zego compatibility
  google_fonts: ^6.2.1
  intl: ^0.20.2
  timeago: ^3.7.1

  # Icons
  cupertino_icons: ^1.0.8
  image_picker: ^1.2.1
  url_launcher: ^6.3.1

  # Payments
  pay: ^2.0.0
  webview_flutter: 4.7.0
  http: ^1.2.2
  country_picker: ^2.0.27
  google_generative_ai: ^0.4.7
  # flutter_paypal_payment removed - using webview_flutter for PayPal
  flutter_dotenv: ^6.0.0
  firebase_storage: ^12.3.2
  appwrite: 20.3.3
  zego_uikit_prebuilt_call: ^4.22.2 # Latest version for best compatibility
  zego_uikit_signaling_plugin: ^2.8.20 # Required for call invitation system
  font_awesome_flutter: ^11.0.0
  flutter_markdown: ^0.7.4
  web: ^1.1.0
  package_info_plus: ^8.0.2
  in_app_update: ^4.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  fake_cloud_firestore: ^3.1.0
  mocktail: ^1.0.4

dependency_overrides:
  webview_flutter_wkwebview: 3.13.0
  # share_plus: 10.1.4  # Removed - causes compatibility issues with zego_uikit

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/launcher_icon_solid.png"
  adaptive_icon_background: "#2175A5"
  adaptive_icon_foreground: "assets/images/logo_for_splash-removebg-preview.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/launcher_icon_solid.png"

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/images/avatars/
    - assets/icons/
    - assets/icons/more/
    - assets/payment_profiles/
